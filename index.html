  {
    id: 3,
    category: "Motion Control",
    badge: "J-MC · 02",
    title: "Tuning kp and kd Without Breaking Anything",
    excerpt: "A short guide to safely adjusting stiffness and damping.",
    body: `A short guide to safely adjusting stiffness (\`kp\`) and damping (\`kd\`) gains before you try anything ambitious.

## Starting values

Begin conservative:

- \`kp = 60.0\`
- \`kd = 1.5\`

Raise \`kp\` gradually if the joint feels too loose. Raise \`kd\` if you see oscillation.`
  }
];

const videos = [
  { id: "dQw4w9WgXcQ", title: "G1 first walk test" },
  { id: "dQw4w9WgXcQ", title: "Arm SDK demo" }
];

const photos = [
  { src: "https://placehold.co/400x400/14213D/FFB000?text=Photo+1", caption: "Bench test, week 1" },
  { src: "https://placehold.co/400x400/14213D/FFB000?text=Photo+2", caption: "New arm mount" },
  { src: "https://placehold.co/400x400/14213D/FFB000?text=Photo+3", caption: "Cable routing" },
  { src: "https://placehold.co/400x400/14213D/FFB000?text=Photo+4", caption: "First stand-up" }
];

/* --------------------------------------------------------- */

function useHashRoute() {
  const [hash, setHash] = useState(window.location.hash);
  useEffect(() => {
    const onChange = () => setHash(window.location.hash);
    window.addEventListener("hashchange", onChange);
    return () => window.removeEventListener("hashchange", onChange);
  }, []);
  return hash;
}

function PostDetail({ post }) {
  useEffect(() => { window.scrollTo(0, 0); }, [post]);
  return (
    <main>
      <a className="back-link" href="#">&larr; Back to all posts</a>
      <div className="post-detail">
        <span className="badge">{post.badge}</span>
        <h1>{post.title}</h1>
        <div
          className="post-detail-body"
          dangerouslySetInnerHTML={{ __html: marked.parse(post.body) }}
        />
      </div>
    </main>
  );
}

function PostsSection() {
  const [filter, setFilter] = useState("All");
  const categories = ["All", "Getting Started", "Motion Control"];
  const shown = filter === "All" ? posts : posts.filter(p => p.category === filter);

  return (
    <section className="block" id="posts">
      <h2>Tutorials</h2>
      <p className="section-sub">Click any card to read the full post. Filter by topic below.</p>
      <div className="filter-bar">
        {categories.map(cat => (
          <button key={cat} className={"filter-btn" + (filter === cat ? " active" : "")}
            onClick={() => setFilter(cat)}>{cat}</button>
        ))}
      </div>
      {shown.length === 0 && <div className="empty-state">No posts in this category yet.</div>}
      {shown.map(post => (
        <article key={post.id} className="card" onClick={() => { window.location.hash = "post-" + post.id; }}>
          <span className="badge">{post.badge}</span>
          <h3>{post.title}</h3>
          <p>{post.excerpt}</p>
          <span className="read-more">READ MORE &rarr;</span>
        </article>
      ))}
    </section>
  );
}

function VideosSection() {
  return (
    <section className="block" id="videos">
      <h2>Videos</h2>
      <p className="section-sub">Demo footage and walkthroughs.</p>
      <div className="video-grid">
        {videos.map((v, i) => (
          <div key={i}>
            <div className="viewport">
              <span className="corner-bl"></span><span className="corner-br"></span>
              <iframe src={"https://www.youtube.com/embed/" + v.id} allowFullScreen></iframe>
            </div>
            <span className="viewport-label">{v.title}</span>
          </div>
        ))}
      </div>
    </section>
  );
}

function GallerySection() {
  const [selected, setSelected] = useState(null);
  return (
    <section className="block" id="gallery">
      <h2>Gallery</h2>
      <p className="section-sub">Click any photo to view it larger.</p>
      <div className="gallery-grid">
        {photos.map((p, i) => (
          <div key={i} className="gallery-item" onClick={() => setSelected(p)}>
            <img src={p.src} alt={p.caption} />
            <div className="gallery-caption">{p.caption}</div>
          </div>
        ))}
      </div>
      {selected && (
        <div className="lightbox-overlay" onClick={() => setSelected(null)}>
          <button className="lightbox-close" onClick={() => setSelected(null)}>CLOSE ✕</button>
          <div className="lightbox-img-wrap" onClick={e => e.stopPropagation()}>
            <img src={selected.src} alt={selected.caption} />
            <div className="lightbox-caption">{selected.caption}</div>
          </div>
        </div>
      )}
    </section>
  );
}

function HomePage() {
  return (
    <React.Fragment>
      <section className="hero">
        <span className="eyebrow">Lab notes &mdash; est. 2026</span>
        <h1>Field notes for new operators.</h1>
        <p className="lede">Tutorials, videos, and photos to get newcomers moving — starting with the Unitree G1 and expanding as the lab grows.</p>
      </section>
      <main>
        <PostsSection />
        <VideosSection />
        <GallerySection />
      </main>
    </React.Fragment>
  );
}

function App() {
  const hash = useHashRoute();
  const postMatch = hash.match(/^#post-(\d+)/);
  const activePost = postMatch ? posts.find(p => p.id === parseInt(postMatch[1], 10)) : null;

  return (
    <React.Fragment>
      <header className="toolbar">
        <div className="brand" onClick={() => { window.location.hash = ""; }}>
          <span className="dot"></span> SAM1695 / ROBOTICS
        </div>
        <nav>
          <a href="#posts">TUTORIALS</a>
          <a href="#videos">VIDEOS</a>
          <a href="#gallery">GALLERY</a>
        </nav>
      </header>

      {activePost ? <PostDetail post={activePost} /> : <HomePage />}

      <footer>SAM1695.GITHUB.IO &nbsp;/&nbsp; BUILT FOR NEWCOMERS</footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
